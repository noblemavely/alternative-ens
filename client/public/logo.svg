<svg viewBox="0 0 1000 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="200" fill="white"/>

  <!-- "Alter" text in black -->
  <text x="10" y="120" font-family="Arial, sans-serif" font-size="100" font-weight="900" fill="#000000">Alter</text>

  <!-- "Natives" with stylized "N" in blue -->
  <g>
    <!-- Blue N -->
    <path d="M 350 80 L 350 140 M 350 80 L 420 140 M 420 80 L 420 140" stroke="#4F46E5" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- atives in blue -->
    <text x="440" y="120" font-family="Arial, sans-serif" font-size="100" font-weight="700" fill="#4F46E5">atives</text>
  </g>

  <!-- "Powered by Native" subtext -->
  <text x="10" y="180" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="#1F2937">Powered by Native</text>
</svg>
