name: Build and Deploy to Digital Ocean

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '10.4.1'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      
      - name: Build application
        run: pnpm run build
      
      - name: Install SSH Key
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_rsa << 'EOF'
          ${{ secrets.DO_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 142.93.252.21 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Digital Ocean
        run: |
          # Copy dist folder to droplet
          scp -i ~/.ssh/id_rsa -r dist root@142.93.252.21:/app/ && echo "✓ Dist uploaded" || echo "✗ Dist upload failed"
          scp -i ~/.ssh/id_rsa package.json pnpm-lock.yaml root@142.93.252.21:/app/

          # Rebuild and restart Docker containers
          ssh -i ~/.ssh/id_rsa root@142.93.252.21 << 'SSHEOF'
            cd /app
            docker-compose down
            docker-compose build --no-cache
            docker-compose up -d
            sleep 5
            docker-compose logs app --tail=20
          SSHEOF

  notify:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.build-and-deploy.result }}" == "success" ]; then
            echo "✅ Deployment successful to alternatives.nativeworld.com"
          else
            echo "❌ Deployment failed"
          fi
