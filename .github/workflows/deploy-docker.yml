name: Build and Deploy to Digital Ocean

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '10.4.1'
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      
      - name: Build application
        run: pnpm run build
      
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Deploy to Digital Ocean
        run: |
          # Add host key to known_hosts
          ssh-keyscan -H 143.244.143.71 >> ~/.ssh/known_hosts 2>/dev/null || true

          # Copy dist folder to droplet
          scp -r dist root@143.244.143.71:/app/ && echo "✓ Dist uploaded" || echo "✗ Dist upload failed"
          scp package.json pnpm-lock.yaml root@143.244.143.71:/app/

          # Rebuild and restart application
          ssh root@143.244.143.71 << 'SSHEOF'
            cd /app
            pnpm run build
            pm2 restart ecosystem.config.cjs
            sleep 5
            pm2 logs alternative-ens --lines 5
          SSHEOF

  notify:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.build-and-deploy.result }}" == "success" ]; then
            echo "✅ Deployment successful to alternatives.nativeworld.com"
          else
            echo "❌ Deployment failed"
          fi
