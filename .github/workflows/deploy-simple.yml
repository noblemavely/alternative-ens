name: Deploy to Digital Ocean (Simple)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Minimal git setup
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.4.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Prepare deployment package
        run: |
          # Create deployment directory
          mkdir -p deploy
          cp -r dist deploy/
          cp -r public deploy/
          cp -r drizzle deploy/
          cp -r server deploy/
          cp package.json deploy/
          cp pnpm-lock.yaml deploy/
          cp docker-compose.yml deploy/
          cp Dockerfile deploy/ 2>/dev/null || true

          # Create .env for production
          cat > deploy/.env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NODE_ENV=production
          VITE_APP_ID=alternative-ens
          APP_ORIGIN=${{ secrets.APP_ORIGIN }}
          LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}
          CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}
          APOLLO_API_KEY=${{ secrets.APOLLO_API_KEY }}
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          SMTP_FROM_EMAIL=${{ secrets.SMTP_FROM_EMAIL }}
          SMTP_FROM_NAME=${{ secrets.SMTP_FROM_NAME }}
          EOF

      - name: Deploy to server via SCP
        env:
          DO_HOST: 68.183.86.134
          DO_USER: root
          DO_PASSWORD: ${{ secrets.DO_PASSWORD }}
        run: |
          apt-get update && apt-get install -y sshpass

          # Deploy application
          sshpass -p "$DO_PASSWORD" scp -o StrictHostKeyChecking=no -r deploy/ $DO_USER@$DO_HOST:/app/

          # Start application
          sshpass -p "$DO_PASSWORD" ssh -o StrictHostKeyChecking=no $DO_USER@$DO_HOST << 'DEPLOY'
            cd /app/deploy

            # Install pnpm on server if not present
            which pnpm || npm install -g pnpm@10.4.1

            # Install dependencies
            pnpm install --frozen-lockfile --prod

            # Stop existing process if running
            pkill -f "node dist/index.js" || true
            sleep 2

            # Start application in background
            nohup node dist/index.js > /tmp/app.log 2>&1 &

            # Wait and check if it started
            sleep 3
            if curl -s http://localhost:3000 > /dev/null; then
              echo "✓ Application started successfully"
            else
              echo "✗ Application failed to start"
              cat /tmp/app.log
              exit 1
            fi
          DEPLOY

      - name: Verify deployment
        run: |
          echo "Deployment completed for commit ${{ github.sha }}"
          echo "Application should be running at https://alternatives.nativeworld.com"
