name: Deploy Production

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        run: pnpm build

      - name: Install SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 174.138.46.88 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via SSH
        run: |
          # Debug: Check dist folder
          echo "=== Checking dist folder ==="
          ls -lh dist/index.js || echo "ERROR: dist/index.js not found"

          echo "=== Connecting to server ==="
          # Verify connection
          ssh -i ~/.ssh/id_rsa root@174.138.46.88 "echo '✓ SSH connection successful'"

          echo "=== Uploading dist folder ==="
          # Upload fresh dist folder
          scp -i ~/.ssh/id_rsa -r dist root@174.138.46.88:/app/ && echo "✓ Dist uploaded" || echo "✗ Upload failed"

          echo "=== Uploading .env ==="
          # Copy .env file
          scp -i ~/.ssh/id_rsa .env root@174.138.46.88:/app/.env.new || echo "⚠ No .env file to upload"

          echo "=== Rebuilding application ==="
          # Rebuild and restart on server
          ssh -i ~/.ssh/id_rsa root@174.138.46.88 << 'SSH'
            cd /app

            # Use new .env if uploaded
            [ -f .env.new ] && mv .env.new .env

            # Rebuild application
            pnpm run build

            # Restart PM2
            pm2 restart ecosystem.config.cjs

            # Wait for restart
            sleep 5

            # Verify deployment
            curl -s http://localhost:3000 > /dev/null && echo "✓ Deployment successful" || echo "⚠ May have issues"
          SSH

      - name: Verify Deployment
        run: |
          echo "✓ Deployment completed"
          echo "Application URL: https://alternatives.nativeworld.com"
