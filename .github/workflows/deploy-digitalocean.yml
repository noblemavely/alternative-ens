name: Deploy to Digital Ocean

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Run type check
        run: pnpm check

      - name: Build application
        run: pnpm build

      - name: Create .env file from secrets
        run: |
          cat > /tmp/.env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NODE_ENV=production
          VITE_APP_ID=alternative-ens
          APP_ORIGIN=${{ secrets.APP_ORIGIN }}
          LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}
          CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}
          APOLLO_API_KEY=${{ secrets.APOLLO_API_KEY }}
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          SMTP_FROM_EMAIL=${{ secrets.SMTP_FROM_EMAIL }}
          SMTP_FROM_NAME=${{ secrets.SMTP_FROM_NAME }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
          EOF

      - name: Deploy to Digital Ocean
        env:
          DO_HOST: 68.183.86.134
          DO_USER: root
          DO_PASSWORD: ${{ secrets.DO_PASSWORD }}
          DO_APP_PATH: /app
        run: |
          # Install sshpass for password-based SSH
          apt-get update && apt-get install -y sshpass

          # Upload entire project structure for docker-compose
          sshpass -p "$DO_PASSWORD" scp -o StrictHostKeyChecking=no -r . $DO_USER@$DO_HOST:$DO_APP_PATH/ \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.env \
            --exclude=dist

          # Upload compiled dist folder
          sshpass -p "$DO_PASSWORD" scp -o StrictHostKeyChecking=no -r dist $DO_USER@$DO_HOST:$DO_APP_PATH/

          # Upload .env file via SCP
          sshpass -p "$DO_PASSWORD" scp -o StrictHostKeyChecking=no /tmp/.env $DO_USER@$DO_HOST:$DO_APP_PATH/.env

          # Deploy using docker-compose via SSH
          sshpass -p "$DO_PASSWORD" ssh -o StrictHostKeyChecking=no $DO_USER@$DO_HOST << 'SSH'
            cd $DO_APP_PATH

            # Stop existing containers if any
            docker-compose down || true

            # Start MySQL and app containers
            docker-compose up -d

            # Wait for database to be ready
            sleep 10

            # Check if both services are running
            docker-compose ps
          SSH

      - name: Notify deployment
        if: always()
        run: echo "Deployment to Digital Ocean completed"
