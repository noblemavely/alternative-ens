version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: alternative-ens-db
    environment:
      MYSQL_ROOT_PASSWORD: alternative_ens
      MYSQL_DATABASE: alternative_ens
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - alternative-ens-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alternative-ens-app
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://root:alternative_ens@db:3306/alternative_ens
      VITE_APP_ID: ${VITE_APP_ID:-default-app-id}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      APOLLO_API_KEY: ${APOLLO_API_KEY:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - alternative-ens-network
    restart: unless-stopped

volumes:
  db_data:

networks:
  alternative-ens-network:
    driver: bridge
